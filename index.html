<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* FULL PAGE BACKGROUND IMAGE */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    rgba(0,0,0,0.55),
    rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1920&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    width:1000px;
    max-width:95%;
    height:650px;

    display:flex;
    overflow:hidden;

    border-radius:25px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* LEFT IMAGE */

.left{
    width:50%;
    position:relative;
}

.left img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.left-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.4);
}

.left-content{
    position:absolute;
    bottom:40px;
    left:30px;
    color:white;
    z-index:10;
}

.left-content h1{
    font-size:38px;
}

.left-content p{
    margin-top:10px;
    line-height:1.6;
}

/* RIGHT LOGIN */

.right{
    width:50%;
    padding:50px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:100%;
    max-width:380px;
}

.login-box h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
    font-size:34px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;

    background:rgba(255,255,255,0.15);
    color:white;
    outline:none;
}

.input-group input::placeholder{
    color:#ddd;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    color:white;
}

.options a{
    color:#7dd3fc;
    text-decoration:none;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;

    background:linear-gradient(
    90deg,
    #06b6d4,
    #3b82f6,
    #8b5cf6
    );

    color:white;
    font-size:17px;
    cursor:pointer;
}

.login-btn:hover{
    opacity:0.9;
}

.signup{
    text-align:center;
    margin-top:20px;
    color:white;
}

.signup a{
    color:#38bdf8;
    text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

.container{
    flex-direction:column;
    height:auto;
}

.left,
.right{
    width:100%;
}

.left{
    height:280px;
}

}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT IMAGE SECTION -->

    <div class="left">

        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1200&q=80"
             alt="Developer">

        <div class="left-overlay"></div>

        <div class="left-content">
            <h1> Idea Portal</h1>
            <p>
                Welcome to the Coding Platform<br>
                
            </p>
        </div>

    </div>

    <!-- RIGHT LOGIN FORM -->

    <div class="right">

        <div class="login-box">

            <h2>Login</h2>

            <form>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text"
                           placeholder="Enter Full Name">
                </div>

                <div class="input-group">
                    <label>Email Address *</label>
                    <input type="email"
                           placeholder="Enter Email Address"
                           required>
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel"
                           placeholder="Enter Mobile Number">
                </div>

                <div class="input-group">
                    <label>Password *</label>
                    <input type="password"
                           placeholder="Enter Password"
                           required>
                </div>

                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button class="login-btn">
                    Login
                </button>

                <div class="signup">
                    New User?
                    <a href="#">Create Account</a>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
